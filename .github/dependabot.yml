version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/Backend"
    schedule:
      interval: "weekly"
    groups:
      nuget-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/WebClient"
    schedule:
      interval: "weekly"
    groups:
      npm-minor:
        update-types: ["minor", "patch"]
