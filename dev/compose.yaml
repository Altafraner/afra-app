services:
  db:
    image: postgres:alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "AfraAppUser"
      POSTGRES_PASSWORD: "AfraAppPassword"
      POSTGRES_DB: "afra-app"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
  pgcli:
    profiles: ["debug"]
    build:
      context: ./pgcli
    depends_on:
      - db
    restart: unless-stopped
    environment:
      POSTGRES_USER: "AfraAppUser"
      POSTGRES_PASSWORD: "AfraAppPassword"
      POSTGRES_DB: "afra-app"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: 5432
    stdin_open: true
    tty: true
  mailcatcher:
    image: ghcr.io/altafraner/mailcatcher:main
    ports:
      - "8090:1080"
      - "1025:1025"
  emergency:
    build: ./emergency
    environment:
      - BASIC_AUTH_USER=admin
      - BASIC_AUTH_PASS=admin
      - FILE_DIR=/data
      - RETENTION_SECONDS=86400
      - SWEEP_INTERVAL_SECONDS=60
    volumes:
      - ./emergency-data:/data
    ports:
      - "8000:8000"
  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "16686:16686"
      - "4317:4317"
